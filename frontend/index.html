<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Chatbot de Gastos</title>
  <link rel="stylesheet" href="/static/style.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet"/>
</head>
<body>

  <div class="chat-shell">
    <div class="chat-header">
      <div class="avatar">
        <svg viewBox="0 0 24 24" fill="none" width="18" height="18">
          <circle cx="12" cy="12" r="10" stroke="#1D9E75" stroke-width="1.5"/>
          <path d="M12 6v6l4 2" stroke="#1D9E75" stroke-width="1.5" stroke-linecap="round"/>
        </svg>
      </div>
      <div class="header-info">
        <h2>Asistente de Gastos</h2>
        <span class="status">● En línea</span>
      </div>
    </div>

    <div class="quick-tags">
      <button class="tag" onclick="sendQuick('¿Cuánto gasté este mes?')">Este mes</button>
      <button class="tag" onclick="sendQuick('Agregar gasto')">+ Gasto</button>
      <button class="tag" onclick="sendQuick('Ver resumen')">Resumen</button>
      <button class="tag" onclick="sendQuick('Categorías')">Categorías</button>
    </div>

    <div id="chat">
      <div class="msg bot">
        <div class="msg-avatar">B</div>
        <div class="msg-wrap">
          <div class="bubble">¡Hola! Soy tu asistente de gastos. ¿En qué te ayudo hoy?</div>
          <div class="msg-time">ahora</div>
        </div>
      </div>
    </div>

    <div class="chat-footer">
      <input type="text" id="mensaje" placeholder="Escribe un mensaje..." />
      <button id="send-btn" onclick="enviar()">
        <svg viewBox="0 0 24 24" fill="none" width="16" height="16">
          <path d="M22 2L11 13" stroke="white" stroke-width="2" stroke-linecap="round"/>
          <path d="M22 2L15 22 11 13 2 9l20-7z" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </button>
    </div>
  </div>

  <script src="/static/script.js"></script>
</body>
</html>
